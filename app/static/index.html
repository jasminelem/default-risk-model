<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>default-probability-model</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --font-sans: 'Work Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            --font-display: 'Work Sans', sans-serif;
        }

        body {
            font-family: var(--font-sans);
            font-feature-settings: "tnum" 1;
            -webkit-font-smoothing: antialiased;
            /* Very subtle lighting so the Liquid Glass blur actually reads */
            background: #0f0f0f;
        }

        /* Display / Headings */
        .title-font {
            font-family: var(--font-display);
            font-feature-settings: "tnum" 1;
            font-weight: 600;
            letter-spacing: -0.02em;
            -webkit-font-smoothing: antialiased;
        }

        /* All-caps micro labels */
        .tracking-micro {
            letter-spacing: 2.8px;
            font-weight: 500;
        }

        /* === Search Bar — Frosted Liquid Glass === */
        .search-input {
            background: rgba(24, 24, 27, 0.78);
            backdrop-filter: blur(26px) saturate(180%);
            -webkit-backdrop-filter: blur(26px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.11);
            box-shadow: 0 12px 32px -10px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.07);
            transition: all 0.32s cubic-bezier(0.23, 1, 0.32, 1);
            letter-spacing: -0.018em;
        }

        .search-input:focus {
            background: rgba(28, 30, 36, 0.92);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 0 6px rgba(59, 130, 246, 0.13),
                0 28px 60px -14px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        /* === Top 10 Risk Table === */
        .risk-table {
            font-size: 0.95rem;
        }

        .risk-table th {
            font-weight: 500;
            letter-spacing: 0.8px;
            color: #a1a1aa;
            padding-top: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .risk-table td {
            padding-top: 15px;
            padding-bottom: 15px;
            font-feature-settings: "tnum";
            transition: background-color 0.1s ease;
        }

        .top-table:hover td {
            background-color: #1f2937;
        }

        .top-table:hover {
            cursor: pointer;
        }

        /* === (Horizon toggle removed — single combined list) === */

        /* === Cards === */
        .card {
            background: #18181b;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1),
                0 4px 6px -4px rgb(0 0 0 / 0.1);
            transition: transform 0.2s cubic-bezier(0.23, 1, 0.32, 1),
                box-shadow 0.2s ease;
        }

        .card:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1),
                0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        /* === Chart Polish === */
        #stock-chart {
            background: transparent;
        }

        /* =====================================================
           LIQUID GLASS + PREMIUM APPLE-STYLE ANIMATIONS
           Smooth, buttery, high-end feel (cubic-bezier is Apple's)
        ===================================================== */

        /* Global premium easing */
        * {
            transition-timing-function: cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* True Liquid Glass surfaces */
        .glass,
        .card,
        #risk-table,
        .search-input,
        #suggestions {
            background: rgba(24, 24, 27, 0.72);
            /* deep translucent zinc */
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.09);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.35),
                0 4px 12px -4px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        /* Softer, more elegant cards with lift */
        .card {
            transition: transform 0.28s cubic-bezier(0.23, 1, 0.32, 1),
                box-shadow 0.28s cubic-bezier(0.23, 1, 0.32, 1),
                border-color 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 22px 40px -12px rgba(0, 0, 0, 0.38),
                0 6px 16px -6px rgba(0, 0, 0, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.13);
        }

        /* Table container — extra liquid depth */
        #risk-table {
            background: transparent;
        }

        #dashboard>div.bg-zinc-900 {
            background: rgba(24, 24, 27, 0.78);
            backdrop-filter: blur(24px) saturate(170%);
        }

        /* Beautiful table row interactions (Liquid hover) */
        .top-table {
            transition: all 0.22s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .top-table:hover {
            background: rgba(255, 255, 255, 0.035) !important;
            transform: translateX(1px);
        }

        .top-table:hover td {
            color: #f4f4f5;
        }

        /* === (Horizon toggle styles removed) === */



        /* Suggestions dropdown — glassmorphic */
        #suggestions {
            background: rgba(24, 24, 27, 0.92);
            backdrop-filter: blur(28px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.45);
        }

        #suggestions>div {
            transition: background 0.15s ease, padding-left 0.15s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #suggestions>div:hover {
            background: rgba(255, 255, 255, 0.055);
            padding-left: 2rem;
        }

        /* Period buttons (stock chart) — soft glass pills */
        .period-btn {
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid transparent;
        }

        .period-btn:hover {
            background: #27272a;
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-0.5px);
        }

        .period-btn.active {
            background: rgba(255, 255, 255, 0.14);
            color: white;
            border-color: rgba(255, 255, 255, 0.18);
        }

        /* Detail view cards get extra love */
        #company-risks .card,
        #live-market .card,
        #company-shap {
            transition: transform 0.32s cubic-bezier(0.23, 1, 0.32, 1),
                box-shadow 0.32s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Subtle entrance animation for detail view */
        #detail-view {
            animation: liquidEnter 0.4s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        @keyframes liquidEnter {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.985);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Risk % numbers — slightly more refined */
        .tabular-nums {
            font-feature-settings: "tnum" 1, "cv05" 1, "cv06" 1;
            letter-spacing: -0.02em;
        }

        /* Back button — premium micro interaction */
        button[onclick="showDashboard()"] {
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        button[onclick="showDashboard()"]:hover {
            color: white;
            transform: translateX(-2px);
        }
    </style>
</head>

<body class="bg-[#0f0f0f] text-white">

    <!-- Main Content - Minimal -->
    <div class="max-w-5xl mx-auto px-6 pt-10 pb-16">

        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-[28px] font-semibold tracking-[-1px] text-white">Default Probability Model</h1>
            <p class="mt-1 text-sm text-white/35">12-month and 5-year corporate default forecasts.</p>
            <a href="/static/methodology.html" class="inline-block mt-3 text-xs font-medium text-white/50 px-3 py-1.5 rounded-lg border border-white/[0.08] hover:border-white/20 hover:text-white/70 transition-all">Methodology &rarr;</a>
        </div>

        <!-- Search -->
        <div class="max-w-2xl mb-8">
            <div class="relative">
                <input id="search-input" type="text" placeholder="Search companies…"
                    class="search-input w-full rounded-2xl px-6 py-3.5 text-[15px] placeholder:text-white/35 outline-none">
                <div id="suggestions"
                    class="hidden absolute mt-1.5 w-full bg-[#161616] border border-white/[0.08] rounded-xl shadow-2xl overflow-hidden z-50">
                </div>
            </div>
        </div>

        <!-- DEFAULT VIEW: Risk List + Calibration -->
        <div id="dashboard">

            <div class="mb-3">
                <div class="text-lg font-semibold tracking-[-0.5px] text-white/90">Top 10 Highest Risk</div>
                <div class="text-xs text-white/30 mt-0.5">Ranked by 12-month default probability</div>
            </div>

            <table id="risk-table" class="w-full text-sm">
                <thead>
                    <tr class="text-white/25 text-xs border-b border-white/[0.06]">
                        <th class="py-2 pl-1 pr-4 text-left w-8">#</th>
                        <th class="py-2 pr-4 text-left">Company</th>
                        <th class="py-2 pr-4 text-left w-16">Ticker</th>
                        <th class="py-2 pr-4 text-left w-16">Rating</th>
                        <th class="py-2 pr-4 text-left w-20">Fiscal</th>
                        <th class="py-2 pr-4 text-right font-mono w-20">12M PD</th>
                        <th class="py-2 pr-1 text-right font-mono w-20">5Y PD</th>
                    </tr>
                </thead>
                <tbody id="risk-tbody" class="divide-y divide-white/[0.04]"></tbody>
            </table>

        </div>

        <!-- Calibration (below risk list, hidden when viewing company detail) -->
        <div id="calibration-section" class="mt-10 border-t border-white/[0.06] pt-6">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <div class="text-sm font-semibold text-white/70">Calibration</div>
                    <div class="text-xs text-white/25 mt-0.5">Predicted PD vs actual default rate</div>
                </div>
                <div class="flex gap-1">
                    <button onclick="loadDashCalibration('12m')" id="dash-cal-12m" class="text-xs font-medium text-white/70 px-2.5 py-1 rounded bg-white/[0.06]">12M</button>
                    <button onclick="loadDashCalibration('5y')" id="dash-cal-5y" class="text-xs text-white/30 px-2.5 py-1 rounded hover:text-white/60 transition-colors">5Y</button>
                </div>
            </div>
            <div id="dash-cal-table" class="text-sm text-white/30 py-4">Loading...</div>
        </div>

        <!-- COMPANY DETAIL VIEW (appears when a company is selected) -->
        <div id="detail-view" class="hidden">
            <button onclick="showDashboard()"
                class="mb-6 text-sm flex items-center gap-2 text-white/60 hover:text-white transition">
                ← Back to Top Risk Lists
            </button>

            <div id="company-header" class="mb-8"></div>

            <div id="company-risks" class="grid md:grid-cols-2 gap-8 mb-6"></div>

            <div id="cds-analyzer" class="mb-6"></div>

            <div id="peer-comparison" class="mb-6"></div>

            <div id="live-market" class="mb-6"></div>

            <div id="company-shap" class="border-t border-white/[0.06] pt-6"></div>
        </div>

    </div>

    <script>
        // ============ APP LOGIC ============
        const input = document.getElementById('search-input');
        const suggestions = document.getElementById('suggestions');
        const dashboard = document.getElementById('dashboard');
        const detailView = document.getElementById('detail-view');

        let debounceTimer;
        let topData = [];

        // Load combined list + calibration on page load
        try {
            loadTopList();
            loadDashCalibration('12m');
        } catch (e) {
            console.error("Failed to load dashboard data:", e);
        }

        async function loadTopList() {
            const res = await fetch('/api/top/combined?limit=10');
            topData = await res.json();
            renderTopList();
        }

        function renderTopList() {
            const data = topData || [];
            const tbody = document.getElementById('risk-tbody');
            if (!Array.isArray(data)) {
                tbody.innerHTML = '<tr><td colspan="7" class="px-8 py-12 text-center text-red-400">Error loading list data. Please restart the server.</td></tr>';
                return;
            }

            if (data.length === 0) {
                tbody.innerHTML = `
            <tr>
                <td colspan="7" class="px-8 py-12 text-center text-white/50">
                    No companies with recent data found.<br>
                    Try re-running <code>generate_risk_lists.py</code> with a relaxed date filter.
                </td>
            </tr>`;
                return;
            }

            tbody.innerHTML = data.map((row, i) => {
                const ticker = row.ticker || '';
                const rating = (row.credit_rating || '').toString().trim().toUpperCase() || '';
                const risk12m = ((row.pred_risk_2026 || 0) * 100).toFixed(2);
                const risk5y = row.pred_risk_5y != null ? ((row.pred_risk_5y) * 100).toFixed(2) : '--';
                const latest = row.latest_observed_date || row.latest_datadate || '';
                return `
            <tr class="hover:bg-white/[0.02] cursor-pointer transition-colors" onclick="selectCompanyFromList('${row.gvkey}', '${row.conm.replace(/'/g, "\\'")}')">
                <td class="py-2.5 pl-1 pr-4 font-mono text-white/25 text-xs">${i + 1}</td>
                <td class="py-2.5 pr-4 font-medium text-white/90 text-sm">${row.conm}</td>
                <td class="py-2.5 pr-4 font-mono text-xs text-white/40">${ticker}</td>
                <td class="py-2.5 pr-4 font-mono text-xs ${rating ? 'text-white/50' : 'text-white/15'}">${rating || '--'}</td>
                <td class="py-2.5 pr-4 text-xs text-white/30 whitespace-nowrap">${latest}</td>
                <td class="py-2.5 pr-4 text-right font-mono tabular-nums text-sm text-white/70">${risk12m}%</td>
                <td class="py-2.5 pr-1 text-right font-mono tabular-nums text-sm text-white/70">${risk5y}${risk5y !== '--' ? '%' : ''}</td>
            </tr>`;
            }).join('');
        }

        function selectCompanyFromList(gvkey, name) {
            input.value = name;
            loadCompanyDetail(gvkey);
        }

        // === Dashboard Calibration Table + Chart ===
        async function loadDashCalibration(horizon) {
            const btn12 = document.getElementById('dash-cal-12m');
            const btn5y = document.getElementById('dash-cal-5y');
            btn12.className = horizon === '12m'
                ? 'text-xs font-medium text-white/70 px-2.5 py-1 rounded bg-white/[0.06]'
                : 'text-xs text-white/30 px-2.5 py-1 rounded hover:text-white/60 transition-colors';
            btn5y.className = horizon === '5y'
                ? 'text-xs font-medium text-white/70 px-2.5 py-1 rounded bg-white/[0.06]'
                : 'text-xs text-white/30 px-2.5 py-1 rounded hover:text-white/60 transition-colors';

            const container = document.getElementById('dash-cal-table');
            try {
                const res = await fetch(`/api/calibration/${horizon}`);
                if (!res.ok) { container.innerHTML = '<div class="text-xs text-white/20 py-4">Not generated yet.</div>'; return; }
                const data = await res.json();
                if (!data || !data.length) { container.innerHTML = '<div class="text-xs text-white/20 py-4">No data.</div>'; return; }

                const rows = data.map(r => {
                    let c = 'text-white/40';
                    if (r.ratio === null) c = 'text-white/20';
                    else if (r.ratio > 0.8 && r.ratio < 1.25) c = 'text-emerald-400/70';
                    else if (r.ratio > 1.5 || r.ratio < 0.67) c = 'text-red-400/70';
                    else c = 'text-amber-400/70';
                    return `<tr class="border-b border-white/[0.04]">
                        <td class="py-1.5 pr-4 font-mono text-white/50">${r.bucket}</td>
                        <td class="py-1.5 pr-4 text-right text-white/25">${r.count.toLocaleString()}</td>
                        <td class="py-1.5 pr-4 text-right text-white/50">${(r.mean_predicted_pd*100).toFixed(2)}%</td>
                        <td class="py-1.5 pr-4 text-right text-white/50">${(r.actual_default_rate*100).toFixed(2)}%</td>
                        <td class="py-1.5 text-right font-medium ${c}">${r.ratio !== null ? r.ratio.toFixed(2)+'x' : '--'}</td>
                    </tr>`;
                }).join('');

                container.innerHTML = `
                    <table class="w-full text-xs">
                        <thead><tr class="text-white/20 border-b border-white/[0.06]">
                            <th class="py-1.5 pr-4 text-left font-medium">Bucket</th>
                            <th class="py-1.5 pr-4 text-right font-medium">Firms</th>
                            <th class="py-1.5 pr-4 text-right font-medium">Predicted</th>
                            <th class="py-1.5 pr-4 text-right font-medium">Actual</th>
                            <th class="py-1.5 text-right font-medium">Ratio</th>
                        </tr></thead>
                        <tbody>${rows}</tbody>
                    </table>`;
            } catch (e) {
                container.innerHTML = '<div class="text-xs text-red-400/40 py-4">Failed to load.</div>';
            }
        }

        // Search typeahead
        input.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            const q = input.value.trim();
            if (q.length < 2) { suggestions.classList.add('hidden'); return; }

            debounceTimer = setTimeout(async () => {
                const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&limit=10`);
                const companies = await res.json();
                suggestions.innerHTML = companies.map(c => `
            <div class="px-7 py-3.5 hover:bg-white/5 cursor-pointer flex items-center justify-between text-sm border-b border-white/10 last:border-0" 
                 onclick="selectFromSearch('${c.gvkey}', '${c.conm.replace(/'/g, "\\'")}')">
                <div>${c.conm}</div>
                <div class="text-[10px] text-white/40">${c.latest_datadate}</div>
            </div>`).join('');
                suggestions.classList.remove('hidden');
            }, 120);
        });

        function selectFromSearch(gvkey, name) {
            input.value = name;
            suggestions.classList.add('hidden');
            loadCompanyDetail(gvkey);
        }

        async function loadCompanyDetail(gvkey) {
            dashboard.classList.add('hidden');
            document.getElementById('calibration-section').classList.add('hidden');
            detailView.classList.remove('hidden');

            const res = await fetch(`/api/predict/${gvkey}`);
            if (!res.ok) {
                detailView.innerHTML = `<div class="text-center py-20 text-red-400">Could not load prediction for this company.</div>`;
                return;
            }
            const d = await res.json();

            // Smart PD formatting: show enough precision so tiny values don't display as "0.0%"
            function fmtPD(prob) {
                const pct = prob * 100;
                if (pct >= 1) return pct.toFixed(1);
                if (pct >= 0.01) return pct.toFixed(2);
                if (pct >= 0.001) return pct.toFixed(3);
                if (prob > 0) return '<0.001';
                return '0.0';
            }
            const p12 = fmtPD(d.prob_12m);
            const p5 = fmtPD(d.prob_5y);

            const tickerHTML = d.ticker && d.ticker.trim()
                ? `<div class="font-mono text-4xl px-6 py-1 bg-white/10 rounded-2xl tracking-[-1.5px] text-white/95">${d.ticker}</div>`
                : '';

            // Credit rating badge (CapIQ / S&P issuer rating)
            let ratingHTML = '';
            const rawRating = (d.credit_rating || '').toString().trim().toUpperCase();
            if (rawRating && rawRating !== 'NR' && rawRating !== 'N/A' && rawRating !== '') {
                const r = rawRating;
                const isIG = /^(AAA|AA[+-]?|A[+-]?|BBB[+-]?)$/.test(r);
                const isJunk = /^(BB[+-]?|B[+-]?|CCC[+-]?|CC|C|D)$/.test(r);
                const ratingClass = isIG ? 'bg-emerald-500/20 text-emerald-300 border-emerald-500/40' :
                                  isJunk ? 'bg-rose-500/20 text-rose-300 border-rose-500/40' :
                                  'bg-amber-500/20 text-amber-300 border-amber-500/40';
                ratingHTML = `<div class="font-mono text-xl px-4 py-1 rounded-2xl border tracking-[1px] ${ratingClass}">${r}</div>`;
            } else {
                ratingHTML = `<div class="font-mono text-xs px-3 py-1 rounded-2xl border border-white/20 text-white/50">UNRATED</div>`;
            }

            const delistedHTML = d.delisted
                ? '<div class="px-2.5 py-1 rounded-xl text-xs font-semibold bg-red-500/20 text-red-300 border border-red-500/40">DELISTED</div>'
                : '';

            document.getElementById('company-header').innerHTML = `
        <div class="flex items-center gap-4 flex-wrap">
            <div class="text-5xl title-font tracking-[-2.2px] font-semibold">${d.conm}</div>
            ${tickerHTML}
            ${ratingHTML}
            ${delistedHTML}
        </div>
        <div class="text-white/50 mt-1">GVKEY ${d.gvkey} • Latest fiscal: ${d.latest_datadate} • CapIQ/S&amp;P Rating: ${rawRating || 'Unrated (no public issuer rating)'}</div>
    `;

            document.getElementById('company-risks').innerHTML = `
        <div>
            <div class="text-xs text-white/35 mb-1">12-MONTH PD</div>
            <div class="text-[56px] leading-none font-semibold tabular-nums tracking-[-3px]">${p12}<span class="text-2xl align-super font-normal">%</span></div>
            <div class="flex items-center gap-3 mt-1">
                <span class="text-sm ${d.risk_level_12m === 'High' ? 'text-red-400' : d.risk_level_12m === 'Medium' ? 'text-amber-400' : 'text-emerald-400'}">${d.risk_level_12m}</span>
                
            </div>
        </div>
        <div>
            <div class="text-xs text-white/35 mb-1">5-YEAR PD</div>
            <div class="text-[56px] leading-none font-semibold tabular-nums tracking-[-3px]">${p5}<span class="text-2xl align-super font-normal">%</span></div>
            <div class="flex items-center gap-3 mt-1">
                <span class="text-sm ${d.risk_level_5y === 'High' ? 'text-red-400' : d.risk_level_5y === 'Medium' ? 'text-amber-400' : 'text-emerald-400'}">${d.risk_level_5y}</span>
                
            </div>
        </div>
    `;

            // === CDS Spread Analyzer (Features 1 + 5: market-implied PD + rich/cheap flag) ===
            window.currentModelPD12m = d.prob_12m;
            window.currentModelPD5y = d.prob_5y;
            document.getElementById('cds-analyzer').innerHTML = `
        <div class="border-t border-white/[0.06] pt-6">
            <div class="text-xs text-white/35 mb-3">CDS SPREAD ANALYZER</div>
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs text-white/40 mb-1.5">CDS Spread (bps)</label>
                    <input id="cds-spread-input" type="number" min="0" step="1" placeholder="e.g. 250"
                        class="w-full rounded-lg px-3 py-2 text-lg font-mono bg-white/[0.04] border border-white/[0.08] text-white placeholder:text-white/20 outline-none focus:border-white/20 transition"
                        oninput="computeMarketPD()">
                    <div class="flex items-center gap-3 mt-2">
                        <label class="text-[10px] text-white/30">Recovery</label>

        // Helper to fetch + draw stock chart (used for initial load + period switches)
        async function loadStockHistory(ticker, period) {
            if (!ticker) return;

            const loadingEl = document.getElementById('chart-loading');
            const chartContainer = document.getElementById('chart-container');

            if (loadingEl) loadingEl.classList.remove('hidden');
            if (chartContainer) chartContainer.style.opacity = '0.35';

            try {
                const res = await fetch(`/api/stock/${encodeURIComponent(ticker)}?period=${period}`);
                const data = await res.json();
                const tried = data.ticker || ticker;

                if (loadingEl) loadingEl.classList.add('hidden');
                if (chartContainer) chartContainer.style.opacity = '1';

                // Always reflect the selected period in the return label (even if history is short)
                const returnLabel = document.getElementById('market-return-label');
                if (returnLabel) {
                    const labelMap = { '12m': '12-month return', '5y': '5-year return', 'all': 'All-time return' };
                    returnLabel.textContent = labelMap[(period || '12m').toLowerCase()] || 'Period return';
                }

                if (!data.price_history || data.price_history.length === 0) {
                    const canvas = document.getElementById('stock-chart');
                    if (canvas) {
                        canvas.parentElement.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-center text-white/50 text-sm py-6">
                        <div>No daily price history found for <span class="font-mono text-white/70">${tried}</span></div>
                        <div class="text-[10px] mt-1 text-white/40">Ticker may be OTC, recently changed, delisted, or extremely low volume.</div>
                    </div>`;
                    }
                    return;
                }
                const ctx = document.getElementById('stock-chart').getContext('2d');
                if (window.currentStockChart) window.currentStockChart.destroy();
                window.currentStockChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.price_history.map(p => p.date),
                        datasets: [{
                            label: 'Close',
                            data: data.price_history.map(p => p.close),
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59,130,246,0.1)',
                            borderWidth: 1.75,
                            tension: 0.2,
                            pointRadius: 0,
                            pointHoverRadius: 4,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: '#111',
                                titleColor: '#fff',
                                bodyColor: '#ddd',
                                displayColors: false,
                                callbacks: { label: (ctx) => `$${ctx.parsed.y}` }
                            }
                        },
                        scales: {
                            x: { display: false },
                            y: {
                                grid: { color: 'rgba(255,255,255,0.06)' },
                                ticks: { color: '#666', font: { size: 10 } }
                            }
                        }
                    }
                });

                // === Update CURRENT MARKET DATA % (and price if missing snapshot) to reflect selected period ===
                const hist = data.price_history || [];
                if (hist.length >= 1) {
                    const lastPrice = hist[hist.length - 1].close;

                    // Backfill the main price number if we didn't have a live snapshot from the predict API
                    const priceValueEl = document.getElementById('market-price-value');
                    if (priceValueEl && priceValueEl.textContent.trim().startsWith('—')) {
                        priceValueEl.innerHTML = `$${lastPrice} <span id="market-period-change" class="text-lg text-white/90 font-medium"></span>`;
                    }

                    if (hist.length > 1) {
                        const firstPrice = hist[0].close;
                        const periodPct = ((lastPrice - firstPrice) / firstPrice) * 100;

                        // Update the % badge (now guaranteed to exist)
                        const changeEl = document.getElementById('market-period-change');
                        if (changeEl) {
                            const cls = periodPct >= 0 ? 'text-emerald-400' : 'text-red-400';
                            changeEl.className = `text-lg ${cls} font-medium`;
                            const sign = periodPct >= 0 ? '+' : '';
                            changeEl.textContent = `${sign}${periodPct.toFixed(1)}%`;
                        }
                    } else {
                        // Only one data point — show N/A or 0 for the return %
                        const changeEl = document.getElementById('market-period-change');
                        if (changeEl) {
                            changeEl.className = 'text-lg text-white/60 font-medium';
                            changeEl.textContent = 'N/A';
                        }
                    }

                    // Render compact recent time series table (most recent first, ~15 rows)
                    const tsEl = document.getElementById('price-timeseries');
                    if (tsEl) {
                        const recent = [...hist].reverse().slice(0, 15);
                        let rows = '';
                        for (let i = 0; i < recent.length; i++) {
                            const p = recent[i];
                            const prev = recent[i + 1] ? recent[i + 1].close : p.close;
                            const dChg = prev ? ((p.close - prev) / prev * 100) : 0;
                            const dChgStr = dChg.toFixed(1);
                            const dCls = dChg >= 0 ? 'text-emerald-400' : 'text-red-400';
                            rows += `<tr class="border-b border-white/5 last:border-0">
                                <td class="py-px pr-4 font-mono text-[10px] text-white/50">${p.date}</td>
                                <td class="py-px pr-3 tabular-nums text-white/90">$${p.close}</td>
                                <td class="py-px text-right font-mono ${dCls}">${dChg >= 0 ? '+' : ''}${dChgStr}%</td>
                            </tr>`;
                        }
                        tsEl.innerHTML = `
                            <div class="flex items-center justify-between mt-3 mb-1">
                                <div class="uppercase tracking-[1.5px] text-[10px] text-white/50">PRICE SERIES • ${period.toUpperCase()}</div>
                                <div class="text-[10px] text-white/40">${hist.length} trading days</div>
                            </div>
                            <div class="overflow-auto max-h-[148px] border border-white/10 rounded-lg bg-black/20">
                                <table class="w-full text-xs"><thead>
                                    <tr class="text-white/40 border-b border-white/10">
                                        <th class="text-left py-1 pl-2 font-normal">Date</th>
                                        <th class="text-left py-1 font-normal">Close</th>
                                        <th class="text-right py-1 pr-2 font-normal">Daily Chg</th>
                                    </tr></thead><tbody>${rows}</tbody></table>
                            </div>`;
                    }
                }
            } catch (e) {
                console.error("Failed to load stock history", period, e);
            }
        }

        // === CDS Spread Analyzer: compute market-implied PD + rich/cheap flag ===
        function computeMarketPD() {
            const spreadInput = document.getElementById('cds-spread-input');
            const recoverySelect = document.getElementById('cds-recovery');
            const resultDiv = document.getElementById('cds-result');
            if (!spreadInput || !resultDiv) return;

            const spreadBps = parseFloat(spreadInput.value);
            if (isNaN(spreadBps) || spreadBps <= 0) {
                resultDiv.innerHTML = '<div class="text-white/40 text-sm">Enter a CDS spread to see the market-implied default probability.</div>';
                return;
            }

            const recovery = parseFloat(recoverySelect.value);
            const spreadDecimal = spreadBps / 10000;
            const marketPD = 1 - Math.exp(-spreadDecimal / (1 - recovery));
            const marketPDpct = (marketPD * 100).toFixed(2);

            const modelPD = window.currentModelPD12m || 0;
            const modelPDpct = (modelPD * 100).toFixed(2);

            // Rich/Cheap flag (Feature 5)
            let flagHTML = '';
            if (modelPD > 0) {
                const ratio = marketPD / modelPD;
                if (ratio > 2.0) {
                    flagHTML = `<div class="mt-3 flex items-center gap-2">
                        <span class="px-2.5 py-0.5 rounded-lg text-xs font-semibold bg-emerald-500/20 text-emerald-300 border border-emerald-500/40">CHEAP</span>
                        <span class="text-xs text-white/50">Market overprices risk (${ratio.toFixed(1)}x model) &mdash; bond may be undervalued</span>
                    </div>`;
                } else if (ratio < 0.5) {
                    flagHTML = `<div class="mt-3 flex items-center gap-2">
                        <span class="px-2.5 py-0.5 rounded-lg text-xs font-semibold bg-rose-500/20 text-rose-300 border border-rose-500/40">RICH</span>
                        <span class="text-xs text-white/50">Market underprices risk (${ratio.toFixed(1)}x model) &mdash; bond may be overvalued</span>
                    </div>`;
                } else {
                    flagHTML = `<div class="mt-3 flex items-center gap-2">
                        <span class="px-2.5 py-0.5 rounded-lg text-xs font-semibold bg-white/10 text-white/60 border border-white/20">FAIR</span>
                        <span class="text-xs text-white/50">Market & model broadly aligned (${ratio.toFixed(1)}x)</span>
                    </div>`;
                }
            }

            resultDiv.innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <div class="text-[10px] tracking-[1.5px] text-white/40 uppercase mb-0.5">Market-Implied PD</div>
                        <div class="text-3xl font-semibold tabular-nums tracking-[-1.5px]">${marketPDpct}<span class="text-lg font-normal">%</span></div>
                    </div>
                    <div>
                        <div class="text-[10px] tracking-[1.5px] text-white/40 uppercase mb-0.5">Model PD (12M)</div>
                        <div class="text-3xl font-semibold tabular-nums tracking-[-1.5px] text-white/70">${modelPDpct}<span class="text-lg font-normal">%</span></div>
                    </div>
                </div>
                ${flagHTML}
            `;
        }

                container.innerHTML = `

                    </div>
                </div>

                <div class="relative h-1.5 bg-white/[0.06] rounded-full mb-4 overflow-hidden">
                    <div class="absolute inset-y-0 left-0 rounded-full bg-gradient-to-r from-emerald-500 via-amber-500 to-red-500" style="width:100%;opacity:0.25"></div>
                    <div class="absolute top-1/2 -translate-y-1/2 w-2.5 h-2.5 rounded-full bg-white border-2 border-[#0f0f0f]" style="left:${barWidth}%"></div>
                </div>

                <div class="grid grid-cols-3 gap-3 text-center mb-4">
                    <div>
                        <div class="text-[10px] text-white/30">Median</div>
                        <div class="font-mono text-sm text-white/60">${(p.peer_median_pd * 100).toFixed(2)}%</div>
                    </div>
                    <div>
                        <div class="text-[10px] text-white/30">Min</div>
                        <div class="font-mono text-sm text-emerald-400/60">${(p.peer_min_pd * 100).toFixed(3)}%</div>
                    </div>
                    <div>
                        <div class="text-[10px] text-white/30">Max</div>
                        <div class="font-mono text-sm text-red-400/60">${(p.peer_max_pd * 100).toFixed(2)}%</div>
                    </div>
                </div>

                ${peerRows ? `
                <div class="border-t border-white/[0.04] pt-3">
                    <div class="text-[10px] text-white/30 mb-2">CLOSEST PEERS</div>
                    <table class="w-full"><tbody>${peerRows}</tbody></table>
                </div>` : ''}
            </div>`;
            } catch (e) {
                container.innerHTML = '';
            }
        }
    </script>
</body>

</html>
